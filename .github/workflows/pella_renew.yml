name: Pella-Renew-Action
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: 🛡️ Proxy Setup
        run: |
          wget https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gunzip gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          nohup ./gost-linux-amd64-2.11.5 -L http://:8080 -F ${{ secrets.GOST_PROXY }} > /dev/null 2>&1 &
          sleep 5
      - name: 🛠️ Install Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb xdotool
          pip install seleniumbase
          seleniumbase install uc_driver
      - name: 🚀 Run Script
        env:
          PELLA_ACCOUNT: ${{ secrets.PELLA_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python pella_renew.py
      - name: 📸 Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-data
          path: "*.png"
